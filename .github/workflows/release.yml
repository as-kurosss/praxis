name: Release

on:
  push:
    tags: ["v*.*.*"]

env:
  CARGO_TERM_COLOR: always
  DOCKER_IMAGE: praxis-api-server
  DOCKER_REGISTRY: ghcr.io

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: .exe
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build (${{ matrix.target }})
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Package binaries
        shell: bash
        run: |
          mkdir -p artifacts
          cp "target/${{ matrix.target }}/release/praxis${{ matrix.suffix }}" "artifacts/praxis-${{ matrix.target }}${{ matrix.suffix }}"
          cp "target/${{ matrix.target }}/release/praxis-api-server${{ matrix.suffix }}" "artifacts/praxis-api-server-${{ matrix.target }}${{ matrix.suffix }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: praxis-${{ matrix.target }}
          path: artifacts/
          if-no-files-found: error

  create-release:
    name: Create Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          for f in praxis-*/praxis-*; do
            sha256sum "$f" >> checksums.txt
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Praxis ${{ github.ref_name }}
          body_path: CHANGELOG.md
          generate_release_notes: true
          files: |
            artifacts/**/*

  docker:
    name: Publish Docker Image
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/${{ env.DOCKER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
